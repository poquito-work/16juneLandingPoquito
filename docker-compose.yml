services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: poquito-frontend:latest
    container_name: poquito-frontend-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
